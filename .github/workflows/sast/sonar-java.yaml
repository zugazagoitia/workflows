---
name: SonarCloud Java Analysis

'on':
  workflow_call:
    inputs:
      jacoco-xml-report-path:
        required: false
        type: string
        description: "Path to the coverage report generated by JaCoCo"
      java-version:
        required: true
        type: number
        description: >
          Java version to use for the analysis. Must be 17 or higher
        default: 21
      build-tool:
        required: true
        type: string
        description: >
          Build tool to use for the analysis. Must be 'maven' or 'gradle'
        default: 'maven'
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  sonar:
    permissions:
      security-events: write  # required for uploading SARIF files
      pull-requests: write  # required for updating PR comments
    name: Analyze with SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: >
          actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: >
          actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b  # v4.5.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.build-tool }}

      - name: Cache SonarCloud packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57  # v4.2.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud analysis (Maven)
        if: ${{ inputs.build-tool == 'maven' }}
        env:
          JACOCO_REPORT_PATH: ${{ inputs.jacoco-xml-report-path }}
        run: |
          mvn -B verify \
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.organization=e-codex \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.java.binaries=target/classes \
          ${{ env.JACOCO_REPORT_PATH != '' &&
            format('-Dsonar.coverage.jacoco.xmlReportPaths={0}',
              env.JACOCO_REPORT_PATH) || '' }}

      - name: Run SonarCloud analysis (Gradle)
        if: ${{ inputs.build-tool == 'gradle' }}
        run: |
          ./gradlew sonarqube \
          -Dsonar.organization=e-codex \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.java.binaries=build/classes/java/main \
          -Dsonar.coverage.jacoco.xmlReportPaths=${{
            inputs.jacoco-xml-report-path
          }} \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
